[package]
name = "simple-debug"
version = "0.1.0"
edition = "2024"
authors = ["ziprangga"]
license = "MIT or Apache-2.0"

[features]
default = []
log-env-support = ["log", "env_logger"]

[dependencies]
log = {version = "0.4", optional = true}
env_logger = { version = "0.11", optional = true }
chrono = "0.4.44"

[workspace]
members = [
    ".",
    "sample"
]

[workspace.dependencies]
simple-debug = {path = "."}
# simple-debug = {path = ".", features = ["log-env-support"]}
