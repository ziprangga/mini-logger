[package]
name = "simple-debug"
version = "0.1.0"
edition = "2024"
authors = ["ziprangga"]
license = "MIT or Apache-2.0"

[features]
default = ["log-env-support"]
log-env-support = ["log", "env_logger"]

[dependencies]
log = {version = "0.4", optional = true}
env_logger = { version = "0.11", optional = true }
once_cell = "1.21.3"
arrayvec = "0.7.6"

[workspace]
members = [
    ".",
    "sample"
]

[workspace.dependencies]
simple-debug = {path = "."}
